version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"

  # Keep NuGet packages up to date (Backend API)
  - package-ecosystem: "nuget"
    directory: "/src/backend"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "nuget"

  # Keep NuGet packages up to date (Frontend App)
  - package-ecosystem: "nuget"
    directory: "/src/frontend"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "nuget"
