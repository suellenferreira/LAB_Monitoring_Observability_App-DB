name: Deploy Azure Monitoring & Observability Lab

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      resourceGroupName:
        description: 'Resource Group name'
        required: true
        default: 'rg-lab-monitoring-observability'
        type: string
      location:
        description: 'Azure region to deploy'
        required: true
        default: 'centralus'
        type: choice
        options:
          - eastus
          - eastus2
          - westus2
          - westus3
          - centralus
          - northeurope
          - westeurope
          - southeastasia
          - brazilsouth
      projectPrefix:
        description: 'Project prefix for resource naming (3-10 chars)'
        required: true
        default: 'labmonitor'
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # ── Azure Identity (from secrets — cannot be externalized) ──
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load deploy config
        run: |
          grep -v '^\s*#' deploy-config.cfg | grep -v '^\s*$' >> $GITHUB_ENV
          # Apply workflow_dispatch overrides (if manual trigger)
          echo "RESOURCE_GROUP=${{ github.event.inputs.resourceGroupName || env.RESOURCE_GROUP_DEFAULT || 'rg-lab-monitoring-observability' }}" >> $GITHUB_ENV
          echo "LOCATION=${{ github.event.inputs.location || env.LOCATION_DEFAULT || 'centralus' }}" >> $GITHUB_ENV
          echo "PROJECT_PREFIX=${{ github.event.inputs.projectPrefix || env.PROJECT_PREFIX_DEFAULT || 'labmonitor' }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ github.event.inputs.environment || env.ENVIRONMENT_DEFAULT || 'dev' }}" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Resource Group exists
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }}

      - name: Validate Bicep template
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: main.bicep
          parameters: >
            projectPrefix=${{ env.PROJECT_PREFIX }}
            environment=${{ env.ENVIRONMENT }}
            location=${{ env.LOCATION }}
            sqlAuthMode=${{ secrets.SQL_AUTH_MODE || 'entraOnly' }}
            sqlEntraAdminObjectId=${{ secrets.SQL_ENTRA_ADMIN_OBJECT_ID }}
            sqlEntraAdminLogin=${{ secrets.SQL_ENTRA_ADMIN_LOGIN }}
            sqlAdminLogin=${{ secrets.SQL_ADMIN_LOGIN || 'sqladminuser' }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD || 'NotUsedInEntraOnlyMode1!' }}
            vmAdminUsername=${{ secrets.VM_ADMIN_USERNAME || 'vmadminuser' }}
            vmAdminPassword=${{ secrets.VM_ADMIN_PASSWORD }}
            appServicePlanSku=${{ env.APP_SERVICE_PLAN_SKU }}
            frontendLinuxFxVersion=${{ env.FRONTEND_RUNTIME }}
            backendLinuxFxVersion=${{ env.BACKEND_RUNTIME }}
            sqlDatabaseSkuName=${{ env.SQL_DATABASE_SKU_NAME }}
            sqlDatabaseSkuTier=${{ env.SQL_DATABASE_SKU_TIER }}
            vmSize=${{ env.VM_SIZE }}
            vmImageOffer=${{ env.VM_IMAGE_OFFER }}
            vmImageSku=${{ env.VM_IMAGE_SKU }}
            osDiskStorageType=${{ env.OS_DISK_STORAGE_TYPE }}
            vnetAddressPrefix=${{ env.VNET_ADDRESS_PREFIX }}
            subnetAddressPrefix=${{ env.SUBNET_ADDRESS_PREFIX }}
            logRetentionDays=${{ env.LOG_RETENTION_DAYS }}
            appInsightsRetentionDays=${{ env.APP_INSIGHTS_RETENTION_DAYS }}
          deploymentMode: Validate

  what-if:
    name: What-If Analysis
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load deploy config
        run: |
          grep -v '^\s*#' deploy-config.cfg | grep -v '^\s*$' >> $GITHUB_ENV
          echo "RESOURCE_GROUP=${{ github.event.inputs.resourceGroupName || env.RESOURCE_GROUP_DEFAULT || 'rg-lab-monitoring-observability' }}" >> $GITHUB_ENV
          echo "LOCATION=${{ github.event.inputs.location || env.LOCATION_DEFAULT || 'centralus' }}" >> $GITHUB_ENV
          echo "PROJECT_PREFIX=${{ github.event.inputs.projectPrefix || env.PROJECT_PREFIX_DEFAULT || 'labmonitor' }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ github.event.inputs.environment || env.ENVIRONMENT_DEFAULT || 'dev' }}" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run What-If
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: main.bicep
          parameters: >
            projectPrefix=${{ env.PROJECT_PREFIX }}
            environment=${{ env.ENVIRONMENT }}
            location=${{ env.LOCATION }}
            sqlAuthMode=${{ secrets.SQL_AUTH_MODE || 'entraOnly' }}
            sqlEntraAdminObjectId=${{ secrets.SQL_ENTRA_ADMIN_OBJECT_ID }}
            sqlEntraAdminLogin=${{ secrets.SQL_ENTRA_ADMIN_LOGIN }}
            sqlAdminLogin=${{ secrets.SQL_ADMIN_LOGIN || 'sqladminuser' }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD || 'NotUsedInEntraOnlyMode1!' }}
            vmAdminUsername=${{ secrets.VM_ADMIN_USERNAME || 'vmadminuser' }}
            vmAdminPassword=${{ secrets.VM_ADMIN_PASSWORD }}
            appServicePlanSku=${{ env.APP_SERVICE_PLAN_SKU }}
            frontendLinuxFxVersion=${{ env.FRONTEND_RUNTIME }}
            backendLinuxFxVersion=${{ env.BACKEND_RUNTIME }}
            sqlDatabaseSkuName=${{ env.SQL_DATABASE_SKU_NAME }}
            sqlDatabaseSkuTier=${{ env.SQL_DATABASE_SKU_TIER }}
            vmSize=${{ env.VM_SIZE }}
            vmImageOffer=${{ env.VM_IMAGE_OFFER }}
            vmImageSku=${{ env.VM_IMAGE_SKU }}
            osDiskStorageType=${{ env.OS_DISK_STORAGE_TYPE }}
            vnetAddressPrefix=${{ env.VNET_ADDRESS_PREFIX }}
            subnetAddressPrefix=${{ env.SUBNET_ADDRESS_PREFIX }}
            logRetentionDays=${{ env.LOG_RETENTION_DAYS }}
            appInsightsRetentionDays=${{ env.APP_INSIGHTS_RETENTION_DAYS }}
          additionalArguments: --what-if

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load deploy config
        run: |
          grep -v '^\s*#' deploy-config.cfg | grep -v '^\s*$' >> $GITHUB_ENV
          echo "RESOURCE_GROUP=${{ github.event.inputs.resourceGroupName || env.RESOURCE_GROUP_DEFAULT || 'rg-lab-monitoring-observability' }}" >> $GITHUB_ENV
          echo "LOCATION=${{ github.event.inputs.location || env.LOCATION_DEFAULT || 'centralus' }}" >> $GITHUB_ENV
          echo "PROJECT_PREFIX=${{ github.event.inputs.projectPrefix || env.PROJECT_PREFIX_DEFAULT || 'labmonitor' }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ github.event.inputs.environment || env.ENVIRONMENT_DEFAULT || 'dev' }}" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }}

      - name: Display deployment parameters (informative)
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                        DISCLAIMER                        ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║ This deployment is for EDUCATIONAL/DEMO purposes only.   ║"
          echo "║ Azure resources WILL INCUR COSTS on your subscription.   ║"
          echo "║                                                          ║"
          echo "║ YOU are responsible for:                                 ║"
          echo "║  - Reviewing parameters and configurations               ║"
          echo "║  - Monitoring and managing costs                         ║"
          echo "║  - Securing all credentials                              ║"
          echo "║  - Deleting resources when no longer needed              ║"
          echo "║                                                          ║"
          echo "║ The authors assume NO liability for charges, data loss,  ║"
          echo "║ or security incidents from the use of this template.     ║"
          echo "║                                                          ║"
          echo "║ Tear down:  az group delete --name ${{ env.RESOURCE_GROUP }} --yes  ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "========================================"
          echo "  Deployment Parameters Summary"
          echo "========================================"
          echo "  Subscription ID : ${{ env.AZURE_SUBSCRIPTION_ID }}"
          echo "  Tenant ID       : ${{ env.AZURE_TENANT_ID }}"
          echo "  Resource Group  : ${{ env.RESOURCE_GROUP }}"
          echo "  Location        : ${{ env.LOCATION }}"
          echo "  Project Prefix  : ${{ env.PROJECT_PREFIX }}"
          echo "  Environment     : ${{ env.ENVIRONMENT }}"
          echo "  ----------------------------------------"
          echo "  App Plan SKU    : ${{ env.APP_SERVICE_PLAN_SKU }}"
          echo "  Frontend Stack  : ${{ env.FRONTEND_RUNTIME }}"
          echo "  Backend Stack   : ${{ env.BACKEND_RUNTIME }}"
          echo "  ----------------------------------------"
          echo "  SQL Auth Mode   : ${{ secrets.SQL_AUTH_MODE || 'entraOnly' }}"
          echo "  SQL Admin Login : ${{ secrets.SQL_ADMIN_LOGIN || 'sqladminuser' }}"
          echo "  SQL DB SKU      : ${{ env.SQL_DATABASE_SKU_NAME }} (${{ env.SQL_DATABASE_SKU_TIER }})"
          echo "  ----------------------------------------"
          echo "  VM Admin User   : ${{ secrets.VM_ADMIN_USERNAME || 'vmadminuser' }}"
          echo "  VM Size         : ${{ env.VM_SIZE }}"
          echo "  VM Image        : ${{ env.VM_IMAGE_OFFER }} / ${{ env.VM_IMAGE_SKU }}"
          echo "  OS Disk Type    : ${{ env.OS_DISK_STORAGE_TYPE }}"
          echo "  ----------------------------------------"
          echo "  VNet CIDR       : ${{ env.VNET_ADDRESS_PREFIX }}"
          echo "  Subnet CIDR     : ${{ env.SUBNET_ADDRESS_PREFIX }}"
          echo "  ----------------------------------------"
          echo "  Log Retention   : ${{ env.LOG_RETENTION_DAYS }} days"
          echo "  AppIns Retention: ${{ env.APP_INSIGHTS_RETENTION_DAYS }} days"
          echo "========================================"

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: main.bicep
          parameters: >
            projectPrefix=${{ env.PROJECT_PREFIX }}
            environment=${{ env.ENVIRONMENT }}
            location=${{ env.LOCATION }}
            sqlAuthMode=${{ secrets.SQL_AUTH_MODE || 'entraOnly' }}
            sqlEntraAdminObjectId=${{ secrets.SQL_ENTRA_ADMIN_OBJECT_ID }}
            sqlEntraAdminLogin=${{ secrets.SQL_ENTRA_ADMIN_LOGIN }}
            sqlAdminLogin=${{ secrets.SQL_ADMIN_LOGIN || 'sqladminuser' }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD || 'NotUsedInEntraOnlyMode1!' }}
            vmAdminUsername=${{ secrets.VM_ADMIN_USERNAME || 'vmadminuser' }}
            vmAdminPassword=${{ secrets.VM_ADMIN_PASSWORD }}
            appServicePlanSku=${{ env.APP_SERVICE_PLAN_SKU }}
            frontendLinuxFxVersion=${{ env.FRONTEND_RUNTIME }}
            backendLinuxFxVersion=${{ env.BACKEND_RUNTIME }}
            sqlDatabaseSkuName=${{ env.SQL_DATABASE_SKU_NAME }}
            sqlDatabaseSkuTier=${{ env.SQL_DATABASE_SKU_TIER }}
            vmSize=${{ env.VM_SIZE }}
            vmImageOffer=${{ env.VM_IMAGE_OFFER }}
            vmImageSku=${{ env.VM_IMAGE_SKU }}
            osDiskStorageType=${{ env.OS_DISK_STORAGE_TYPE }}
            vnetAddressPrefix=${{ env.VNET_ADDRESS_PREFIX }}
            subnetAddressPrefix=${{ env.SUBNET_ADDRESS_PREFIX }}
            logRetentionDays=${{ env.LOG_RETENTION_DAYS }}
            appInsightsRetentionDays=${{ env.APP_INSIGHTS_RETENTION_DAYS }}
          deploymentName: lab-monitoring-${{ github.run_number }}
          failOnStdErr: false
