name: Deploy Azure Monitoring & Observability Lab

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      resourceGroupName:
        description: 'Resource Group name'
        required: true
        default: 'rg-lab-monitoring-observability'
        type: string
      location:
        description: 'Azure region to deploy'
        required: true
        default: 'centralus'
        type: choice
        options:
          - eastus
          - eastus2
          - westus2
          - westus3
          - centralus
          - northeurope
          - westeurope
          - southeastasia
          - brazilsouth
      projectPrefix:
        description: 'Project prefix for resource naming (3-10 chars)'
        required: true
        default: 'labmonitor'
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # ── Azure Identity (from secrets — cannot be externalized) ──
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load deploy config
        run: grep -v '^\s*#' deploy-config.cfg | grep -v '^\s*$' >> $GITHUB_ENV

      - name: Apply overrides
        run: |
          echo "RESOURCE_GROUP=${{ github.event.inputs.resourceGroupName || env.RESOURCE_GROUP_DEFAULT }}" >> $GITHUB_ENV
          echo "LOCATION=${{ github.event.inputs.location || env.LOCATION_DEFAULT }}" >> $GITHUB_ENV
          echo "PROJECT_PREFIX=${{ github.event.inputs.projectPrefix || env.PROJECT_PREFIX_DEFAULT }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ github.event.inputs.environment || env.ENVIRONMENT_DEFAULT }}" >> $GITHUB_ENV

      - name: Extract SP credentials
        run: |
          SP_CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientId')
          SP_CLIENT_SECRET=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientSecret')
          echo "::add-mask::$SP_CLIENT_SECRET"
          echo "SP_CLIENT_ID=$SP_CLIENT_ID" >> $GITHUB_ENV
          echo "SP_CLIENT_SECRET=$SP_CLIENT_SECRET" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Resource Group exists
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }}

      - name: Validate Bicep template
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: main.bicep
          parameters: >
            projectPrefix=${{ env.PROJECT_PREFIX }}
            environment=${{ env.ENVIRONMENT }}
            location=${{ env.LOCATION }}
            sqlAuthMode=${{ secrets.SQL_AUTH_MODE || 'entraOnly' }}
            sqlEntraAdminObjectId=${{ secrets.SQL_ENTRA_ADMIN_OBJECT_ID }}
            sqlEntraAdminLogin=${{ secrets.SQL_ENTRA_ADMIN_LOGIN }}
            sqlEntraAdminPrincipalType=${{ secrets.SQL_ENTRA_ADMIN_PRINCIPAL_TYPE || 'Application' }}
            sqlAdminLogin=${{ secrets.SQL_ADMIN_LOGIN || 'sqladminuser' }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            spClientId=${{ env.SP_CLIENT_ID }}
            spClientSecret=${{ env.SP_CLIENT_SECRET }}
            vmAdminUsername=${{ secrets.VM_ADMIN_USERNAME || 'vmadminuser' }}
            vmAdminPassword=${{ secrets.VM_ADMIN_PASSWORD }}
            appServicePlanSku=${{ env.APP_SERVICE_PLAN_SKU }}
            frontendLinuxFxVersion=${{ env.FRONTEND_RUNTIME }}
            backendLinuxFxVersion=${{ env.BACKEND_RUNTIME }}
            sqlDatabaseSkuName=${{ env.SQL_DATABASE_SKU_NAME }}
            sqlDatabaseSkuTier=${{ env.SQL_DATABASE_SKU_TIER }}
            vmSize=${{ env.VM_SIZE }}
            vmImageOffer=${{ env.VM_IMAGE_OFFER }}
            vmImageSku=${{ env.VM_IMAGE_SKU }}
            osDiskStorageType=${{ env.OS_DISK_STORAGE_TYPE }}
            vnetAddressPrefix=${{ env.VNET_ADDRESS_PREFIX }}
            subnetAddressPrefix=${{ env.SUBNET_ADDRESS_PREFIX }}
            logRetentionDays=${{ env.LOG_RETENTION_DAYS }}
            appInsightsRetentionDays=${{ env.APP_INSIGHTS_RETENTION_DAYS }}
            deployAlerts=${{ env.DEPLOY_ALERTS || 'false' }}
            alertEmailAddress=${{ secrets.ALERT_EMAIL_ADDRESS || '' }}
          deploymentMode: Validate

  what-if:
    name: What-If Analysis
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load deploy config
        run: grep -v '^\s*#' deploy-config.cfg | grep -v '^\s*$' >> $GITHUB_ENV

      - name: Apply overrides
        run: |
          echo "RESOURCE_GROUP=${{ github.event.inputs.resourceGroupName || env.RESOURCE_GROUP_DEFAULT }}" >> $GITHUB_ENV
          echo "LOCATION=${{ github.event.inputs.location || env.LOCATION_DEFAULT }}" >> $GITHUB_ENV
          echo "PROJECT_PREFIX=${{ github.event.inputs.projectPrefix || env.PROJECT_PREFIX_DEFAULT }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ github.event.inputs.environment || env.ENVIRONMENT_DEFAULT }}" >> $GITHUB_ENV

      - name: Extract SP credentials
        run: |
          SP_CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientId')
          SP_CLIENT_SECRET=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientSecret')
          echo "::add-mask::$SP_CLIENT_SECRET"
          echo "SP_CLIENT_ID=$SP_CLIENT_ID" >> $GITHUB_ENV
          echo "SP_CLIENT_SECRET=$SP_CLIENT_SECRET" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run What-If
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: main.bicep
          parameters: >
            projectPrefix=${{ env.PROJECT_PREFIX }}
            environment=${{ env.ENVIRONMENT }}
            location=${{ env.LOCATION }}
            sqlAuthMode=${{ secrets.SQL_AUTH_MODE || 'entraOnly' }}
            sqlEntraAdminObjectId=${{ secrets.SQL_ENTRA_ADMIN_OBJECT_ID }}
            sqlEntraAdminLogin=${{ secrets.SQL_ENTRA_ADMIN_LOGIN }}
            sqlEntraAdminPrincipalType=${{ secrets.SQL_ENTRA_ADMIN_PRINCIPAL_TYPE || 'Application' }}
            sqlAdminLogin=${{ secrets.SQL_ADMIN_LOGIN || 'sqladminuser' }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            spClientId=${{ env.SP_CLIENT_ID }}
            spClientSecret=${{ env.SP_CLIENT_SECRET }}
            vmAdminUsername=${{ secrets.VM_ADMIN_USERNAME || 'vmadminuser' }}
            vmAdminPassword=${{ secrets.VM_ADMIN_PASSWORD }}
            appServicePlanSku=${{ env.APP_SERVICE_PLAN_SKU }}
            frontendLinuxFxVersion=${{ env.FRONTEND_RUNTIME }}
            backendLinuxFxVersion=${{ env.BACKEND_RUNTIME }}
            sqlDatabaseSkuName=${{ env.SQL_DATABASE_SKU_NAME }}
            sqlDatabaseSkuTier=${{ env.SQL_DATABASE_SKU_TIER }}
            vmSize=${{ env.VM_SIZE }}
            vmImageOffer=${{ env.VM_IMAGE_OFFER }}
            vmImageSku=${{ env.VM_IMAGE_SKU }}
            osDiskStorageType=${{ env.OS_DISK_STORAGE_TYPE }}
            vnetAddressPrefix=${{ env.VNET_ADDRESS_PREFIX }}
            subnetAddressPrefix=${{ env.SUBNET_ADDRESS_PREFIX }}
            logRetentionDays=${{ env.LOG_RETENTION_DAYS }}
            appInsightsRetentionDays=${{ env.APP_INSIGHTS_RETENTION_DAYS }}
            deployAlerts=${{ env.DEPLOY_ALERTS || 'false' }}
            alertEmailAddress=${{ secrets.ALERT_EMAIL_ADDRESS || '' }}
          additionalArguments: --what-if

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load deploy config
        run: grep -v '^\s*#' deploy-config.cfg | grep -v '^\s*$' >> $GITHUB_ENV

      - name: Apply overrides
        run: |
          echo "RESOURCE_GROUP=${{ github.event.inputs.resourceGroupName || env.RESOURCE_GROUP_DEFAULT }}" >> $GITHUB_ENV
          echo "LOCATION=${{ github.event.inputs.location || env.LOCATION_DEFAULT }}" >> $GITHUB_ENV
          echo "PROJECT_PREFIX=${{ github.event.inputs.projectPrefix || env.PROJECT_PREFIX_DEFAULT }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ github.event.inputs.environment || env.ENVIRONMENT_DEFAULT }}" >> $GITHUB_ENV

      - name: Extract SP credentials
        run: |
          SP_CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientId')
          SP_CLIENT_SECRET=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientSecret')
          echo "::add-mask::$SP_CLIENT_SECRET"
          echo "SP_CLIENT_ID=$SP_CLIENT_ID" >> $GITHUB_ENV
          echo "SP_CLIENT_SECRET=$SP_CLIENT_SECRET" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }}

      - name: Display deployment parameters (informative)
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                        DISCLAIMER                        ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║ This deployment is for EDUCATIONAL/DEMO purposes only.   ║"
          echo "║ Azure resources WILL INCUR COSTS on your subscription.   ║"
          echo "║                                                          ║"
          echo "║ YOU are responsible for:                                 ║"
          echo "║  - Reviewing parameters and configurations               ║"
          echo "║  - Monitoring and managing costs                         ║"
          echo "║  - Securing all credentials                              ║"
          echo "║  - Deleting resources when no longer needed              ║"
          echo "║                                                          ║"
          echo "║ The authors assume NO liability for charges, data loss,  ║"
          echo "║ or security incidents from the use of this template.     ║"
          echo "║                                                          ║"
          echo "║ Tear down:  az group delete --name ${{ env.RESOURCE_GROUP }} --yes  ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "========================================"
          echo "  Deployment Parameters Summary"
          echo "========================================"
          echo "  Subscription ID : ***masked***"
          echo "  Tenant ID       : ***masked***"
          echo "  Resource Group  : ${{ env.RESOURCE_GROUP }}"
          echo "  Location        : ${{ env.LOCATION }}"
          echo "  Project Prefix  : ${{ env.PROJECT_PREFIX }}"
          echo "  Environment     : ${{ env.ENVIRONMENT }}"
          echo "  ----------------------------------------"
          echo "  App Plan SKU    : ${{ env.APP_SERVICE_PLAN_SKU }}"
          echo "  Frontend Stack  : ${{ env.FRONTEND_RUNTIME }}"
          echo "  Backend Stack   : ${{ env.BACKEND_RUNTIME }}"
          echo "  ----------------------------------------"
          echo "  SQL Auth Mode   : ${{ secrets.SQL_AUTH_MODE || 'entraOnly' }}"
          echo "  SQL Admin Login : ***masked***"
          echo "  SQL DB SKU      : ${{ env.SQL_DATABASE_SKU_NAME }} (${{ env.SQL_DATABASE_SKU_TIER }})"
          echo "  ----------------------------------------"
          echo "  VM Admin User   : ${{ secrets.VM_ADMIN_USERNAME || 'vmadminuser' }}"
          echo "  VM Size         : ${{ env.VM_SIZE }}"
          echo "  VM Image        : ${{ env.VM_IMAGE_OFFER }} / ${{ env.VM_IMAGE_SKU }}"
          echo "  OS Disk Type    : ${{ env.OS_DISK_STORAGE_TYPE }}"
          echo "  ----------------------------------------"
          echo "  VNet CIDR       : ${{ env.VNET_ADDRESS_PREFIX }}"
          echo "  Subnet CIDR     : ${{ env.SUBNET_ADDRESS_PREFIX }}"
          echo "  ----------------------------------------"
          echo "  Log Retention   : ${{ env.LOG_RETENTION_DAYS }} days"
          echo "  AppIns Retention: ${{ env.APP_INSIGHTS_RETENTION_DAYS }} days"
          echo "========================================"

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: main.bicep
          parameters: >
            projectPrefix=${{ env.PROJECT_PREFIX }}
            environment=${{ env.ENVIRONMENT }}
            location=${{ env.LOCATION }}
            sqlAuthMode=${{ secrets.SQL_AUTH_MODE || 'entraOnly' }}
            sqlEntraAdminObjectId=${{ secrets.SQL_ENTRA_ADMIN_OBJECT_ID }}
            sqlEntraAdminLogin=${{ secrets.SQL_ENTRA_ADMIN_LOGIN }}
            sqlEntraAdminPrincipalType=${{ secrets.SQL_ENTRA_ADMIN_PRINCIPAL_TYPE || 'Application' }}
            sqlAdminLogin=${{ secrets.SQL_ADMIN_LOGIN || 'sqladminuser' }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            spClientId=${{ env.SP_CLIENT_ID }}
            spClientSecret=${{ env.SP_CLIENT_SECRET }}
            vmAdminUsername=${{ secrets.VM_ADMIN_USERNAME || 'vmadminuser' }}
            vmAdminPassword=${{ secrets.VM_ADMIN_PASSWORD }}
            appServicePlanSku=${{ env.APP_SERVICE_PLAN_SKU }}
            frontendLinuxFxVersion=${{ env.FRONTEND_RUNTIME }}
            backendLinuxFxVersion=${{ env.BACKEND_RUNTIME }}
            sqlDatabaseSkuName=${{ env.SQL_DATABASE_SKU_NAME }}
            sqlDatabaseSkuTier=${{ env.SQL_DATABASE_SKU_TIER }}
            vmSize=${{ env.VM_SIZE }}
            vmImageOffer=${{ env.VM_IMAGE_OFFER }}
            vmImageSku=${{ env.VM_IMAGE_SKU }}
            osDiskStorageType=${{ env.OS_DISK_STORAGE_TYPE }}
            vnetAddressPrefix=${{ env.VNET_ADDRESS_PREFIX }}
            subnetAddressPrefix=${{ env.SUBNET_ADDRESS_PREFIX }}
            logRetentionDays=${{ env.LOG_RETENTION_DAYS }}
            appInsightsRetentionDays=${{ env.APP_INSIGHTS_RETENTION_DAYS }}
            deployAlerts=${{ env.DEPLOY_ALERTS || 'false' }}
            alertEmailAddress=${{ secrets.ALERT_EMAIL_ADDRESS || '' }}
          deploymentName: lab-monitoring-${{ github.run_number }}
          failOnStdErr: false

      # ── Build & Deploy .NET Applications ──

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Backend API
        run: dotnet publish src/backend/BackendApi.csproj -c Release -o ${{ runner.temp }}/backend

      - name: Build Frontend App
        run: dotnet publish src/frontend/FrontendApp.csproj -c Release -o ${{ runner.temp }}/frontend

      - name: Deploy Backend API to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-backend-${{ env.PROJECT_PREFIX }}-${{ env.ENVIRONMENT }}
          package: ${{ runner.temp }}/backend

      - name: Deploy Frontend App to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-frontend-${{ env.PROJECT_PREFIX }}-${{ env.ENVIRONMENT }}
          package: ${{ runner.temp }}/frontend

      - name: Display application URLs
        run: |
          echo "========================================"
          echo "  Application URLs"
          echo "========================================"
          echo "  Frontend : https://app-frontend-${{ env.PROJECT_PREFIX }}-${{ env.ENVIRONMENT }}.azurewebsites.net"
          echo "  Backend  : https://app-backend-${{ env.PROJECT_PREFIX }}-${{ env.ENVIRONMENT }}.azurewebsites.net"
          echo "  API Health: https://app-backend-${{ env.PROJECT_PREFIX }}-${{ env.ENVIRONMENT }}.azurewebsites.net/api/health"
          echo "========================================"
