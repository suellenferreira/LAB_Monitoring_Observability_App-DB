name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature or improvement you'd like to see.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this useful?
      description: Explain the use case or problem this would solve.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Infrastructure (Bicep modules)
        - Pipeline (GitHub Actions)
        - Application code (.NET)
        - Observability (Workbook / Grafana / Alerts)
        - Documentation
        - Other
    validations:
      required: true
