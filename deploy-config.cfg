# ============================================================================
# Deploy Configuration — Azure Monitoring & Observability Lab
# ============================================================================
# This file contains ALL tunable deployment parameters in a single place.
# The GitHub Actions workflow loads these values automatically.
# For local CLI deployments, use main.bicepparam instead.
#
# To customize: edit the values below and push to trigger a new deployment.
# Lines starting with # are comments and are ignored.
# ============================================================================

# ── Deployment Scope ──
RESOURCE_GROUP_DEFAULT=rg-lab-monitoring-observability
LOCATION_DEFAULT=centralus
PROJECT_PREFIX_DEFAULT=labmonitor
ENVIRONMENT_DEFAULT=dev

# ── App Service ──
APP_SERVICE_PLAN_SKU=S1
FRONTEND_RUNTIME=DOTNETCORE|8.0
BACKEND_RUNTIME=DOTNETCORE|8.0

# ── SQL Database (PaaS) ──
SQL_DATABASE_SKU_NAME=S0
SQL_DATABASE_SKU_TIER=Standard

# ── SQL VM (IaaS) ──
VM_SIZE=Standard_D2s_v5
VM_IMAGE_OFFER=sql2022-ws2022
VM_IMAGE_SKU=sqldev-gen2
OS_DISK_STORAGE_TYPE=Standard_LRS

# ── Networking ──
VNET_ADDRESS_PREFIX=10.100.0.0/16
SUBNET_ADDRESS_PREFIX=10.100.1.0/24
# Restrict RDP (3389) and SQL (1433) NSG access. Set to your public IP (e.g., 203.0.113.50).
# WARNING: Default '*' allows any source — change this before deploying!
ALLOWED_SOURCE_ADDRESS=*

# ── Observability ──
LOG_RETENTION_DAYS=90
APP_INSIGHTS_RETENTION_DAYS=90

# ── Alerts (Optional) ──
# Set to true to deploy Azure Monitor alert rules (Action Group + Log/Metric alerts)
DEPLOY_ALERTS=true

# ── Grafana (Optional) ──
# COST WARNING: Azure Managed Grafana — Standard tier (only supported SKU).
#   X1 (default): ~$62/month + $6/active user
#   X2 (larger) : ~$124/month + $6/active user
# ⚠ Costs are approximate as of April 2026. Confirm current pricing at:
#   https://azure.microsoft.com/pricing/details/managed-grafana/
# Free alternative: Azure Monitor dashboards with Grafana (preview) — see README.
# Set to true to deploy. Delete the resource when no longer needed.
DEPLOY_GRAFANA=true
GRAFANA_SKU_SIZE=X1
# Object ID of the user/group to grant Grafana Admin access (required for UI).
# Get your ID: az ad signed-in-user show --query id -o tsv
# ⚠ Replace with YOUR Object ID before deploying! Do not commit personal identity values.
GRAFANA_ADMIN_PRINCIPAL_ID=
